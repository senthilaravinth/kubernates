apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-system-deployment
  labels:
    app: delivery-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: delivery-system
  template:
    metadata:
      labels:
        app: delivery-system
    spec:
      containers:
      - name: delivery-system
        # This MUST match the IMAGE_NAME in your pipeline
        image: 23mis0086/simplejava:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: delivery-system-service
spec:
  type: NodePort
  selector:
    app: delivery-system
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30007
