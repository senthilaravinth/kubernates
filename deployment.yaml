apiVersion: apps/v1
kind: Deployment
metadata:
  name: grocery-delivery-app-deployment
  labels:
    app: grocery-delivery-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: grocery-delivery-app
  template:
    metadata:
      labels:
        app: grocery-delivery-app
    spec:
      containers:
      - name: grocery-delivery-app
        image: praveen0210/grocery-delivery-system:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: grocery-delivery-app-service
spec:
  type: NodePort
  selector:
    app: grocery-delivery-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30007
